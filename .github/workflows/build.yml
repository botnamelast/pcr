name: 👿🔥Build PCR Mod APK (C++)

on:
  workflow_dispatch:

jobs:

  # ============================================================
  # JOB 1: Compile C++ → libmod.so via NDK
  # ============================================================
  build-so:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Compile libmod.so
        run: |
          mkdir -p libs
          $ANDROID_NDK_HOME/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk \
            NDK_OUT=obj \
            NDK_LIBS_OUT=libs
          echo "=== libmod.so ==="
          find libs -name "*.so"

      - name: Upload libmod.so
        uses: actions/upload-artifact@v4
        with:
          name: mod-so
          path: libs/arm64-v8a/libmod.so

  # ============================================================
  # JOB 2: Build APK (inject libmod.so + NativeBridge.java)
  # ============================================================
  build-apk:
    runs-on: ubuntu-latest
    needs: build-so
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download libmod.so artifact
        uses: actions/download-artifact@v4
        with:
          name: mod-so
          path: libs/arm64-v8a/

      - name: Download APK ori
        run: |
          curl -L -o pcr.apk \
            "https://github.com/botnamelast/pcr-mod/releases/download/kontol/pcr.apk.zip"
          file pcr.apk
          ls -lh pcr.apk

      - name: Install tools
        run: |
          curl -L -o apktool.jar \
            "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
          echo '#!/bin/bash' > apktool.sh
          echo 'java -jar /usr/local/bin/apktool.jar "$@"' >> apktool.sh
          chmod +x apktool.sh
          sudo mv apktool.sh /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/
          apktool --version

          wget -q "https://dl.google.com/android/repository/build-tools_r34-linux.zip" \
            -O build-tools.zip
          unzip -q build-tools.zip
          sudo mv android-14 /usr/local/lib/android-14
          echo "PATH=/usr/local/lib/android-14:$PATH" >> $GITHUB_ENV
          /usr/local/lib/android-14/d8 --version

      - name: Decompile APK
        run: |
          apktool d pcr.apk -o pcr_decompiled --use-aapt2 -f

      - name: Compile NativeBridge.java → DEX
        run: |
          curl -L -o android.jar \
            "https://github.com/Reginer/aosp-android-jar/raw/main/android-33/android.jar"
          mkdir -p compiled_classes
          javac -source 8 -target 8 \
            -cp android.jar \
            -d compiled_classes \
            src/com/StudioFurukawa/PixelCarRacer/NativeBridge.java
          mkdir -p dex_out
          /usr/local/lib/android-14/d8 \
            --output dex_out \
            --lib android.jar \
            $(find compiled_classes -name "*.class")
          echo "=== DEX output ==="
          ls -lh dex_out/

      - name: Inject libmod.so ke APK
        run: |
          mkdir -p pcr_decompiled/lib/arm64-v8a
          cp libs/arm64-v8a/libmod.so pcr_decompiled/lib/arm64-v8a/
          echo "libmod.so injected!"
          ls -lh pcr_decompiled/lib/arm64-v8a/

      - name: Inject NativeBridge smali ke APK
        run: |
          java -jar /usr/local/bin/apktool.jar d dex_out/classes.dex \
            -o bridge_smali --no-res -f
          cp -r bridge_smali/smali/com/StudioFurukawa/PixelCarRacer/. \
            pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/
          echo "NativeBridge smali injected!"
          ls pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/

      - name: Patch RunnerActivity - inject NativeBridge.startMod()
        run: |
          RUNNER="pcr_decompiled/smali/com/StudioFurukawa/PixelCarRacer/RunnerActivity.smali"
          if [ -f "$RUNNER" ]; then
            sed -i '/invoke-super.*onCreate/a\
        \n    invoke-static {}, Lcom/StudioFurukawa/PixelCarRacer/NativeBridge;->startMod()V' \
              "$RUNNER"
            echo "RunnerActivity patched!"
          else
            echo "RunnerActivity not found!"
            find pcr_decompiled/smali -name "*.smali" | head -20
          fi

      - name: Recompile APK
        run: |
          apktool b pcr_decompiled \
            --use-aapt2 \
            -o pcr_mod_unsigned.apk
          echo "=== Recompile done ==="
          ls -lh pcr_mod_unsigned.apk

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > mod.keystore

          /usr/local/lib/android-14/zipalign \
            -v -p 4 pcr_mod_unsigned.apk pcr_mod_aligned.apk

          /usr/local/lib/android-14/apksigner sign \
            --ks mod.keystore \
            --ks-pass pass:${{ secrets.KEYSTORE_PASS }} \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --key-pass pass:${{ secrets.KEYSTORE_PASS }} \
            --out pcr_mod_signed.apk \
            pcr_mod_aligned.apk

          echo "=== APK signed ==="
          ls -lh pcr_mod_signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pcr-mod-apk
          path: pcr_mod_signed.apk
